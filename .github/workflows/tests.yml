name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore uTelemetry.sln

      - name: Build
        run: dotnet build uTelemetry.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
